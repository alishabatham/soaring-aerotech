kind = "web"
previewPath = "/"
title = "Soaring Aerotech"
version = "1.0.0"
id = "artifacts/soaring-aerotech"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22366

[services.development]
run = "pnpm --filter @workspace/soaring-aerotech run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/soaring-aerotech", "run", "build" ]
publicDir = "artifacts/soaring-aerotech/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22366"
BASE_PATH = "/"
